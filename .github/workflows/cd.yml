# ===========================================
# Clenzy Sites — CI/CD (Next.js SSR, image GHCR)
# ===========================================
# Flux (miroir du pattern clenzy-client) :
#   - push main        → CI (typecheck + build) + push image GHCR (tag branche + sha)
#   - push production  → CI + push image GHCR (:latest) + déclenchement déploiement via clenzy-infra
#   - PR main/production → CI obligatoire (gate)
#
# Le service est résolu PAR HOSTNAME ({slug}.clenzy.site / domaine custom) ; voir
# clenzy-infra/CLENZY-SITES-DEPLOY.md. NEXT_PUBLIC_WIDGET_BASE_URL a un défaut prod-correct
# (app.clenzy.fr) dans le code, aucun build-arg requis ici.

name: CI/CD Clenzy Sites

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/clenzy-sites

jobs:
  typecheck-and-build:
    name: TypeCheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Pas de package-lock.json versionné → npm install (le Dockerfile fait `npm ci || npm install`).
      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build (Next.js standalone)
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/production' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger deploy via clenzy-infra
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/production'
    env:
      INFRA_REPOSITORY: ${{ vars.INFRA_REPOSITORY || format('{0}/clenzy-infra', github.repository_owner) }}

    steps:
      - name: Validate dispatch configuration
        env:
          DISPATCH_TOKEN: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::Missing INFRA_REPO_DISPATCH_TOKEN secret. Add a token that can trigger workflows on $INFRA_REPOSITORY."
            exit 1
          fi

      - name: Trigger infra deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
          repository: ${{ env.INFRA_REPOSITORY }}
          event-type: deploy-clenzy-sites
          client-payload: >-
            {
              "service": "clenzy-sites",
              "environment": "production",
              "image": "ghcr.io/${{ env.IMAGE_NAME }}:latest",
              "source_repo": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}"
            }
